<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Call with URL Param</title>
</head>
<body>
  <h1>Fetching data...</h1>

  <script>
    function getAccessTokenFromURL() {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('at');
    }

    async function fetchData() {
      const accessToken = getAccessTokenFromURL();

      if (!accessToken) {
        document.body.innerHTML = "<h1>Error: 'at' parameter not found in URL</h1>";
        return;
      }

      try {
        const response = await fetch("https://iassistant.ideas2it.com/api/forum/comment/reply", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${accessToken}`,
            "Accept": "application/json"
          },
          body: JSON.stringify({
            parentId: "6a4606bb6344590007daee00",
            comment: ":)",
            fileUrl: ""
          })
        });

        const data = await response.json();
        console.log(data);        

      } catch (error) {
        console.error('Error fetching data:', error);
        document.body.innerHTML = "<h1>Error fetching data. Check console for details.</h1>";
      } finally {
        window.location.href = "https://iassistant.ideas2it.com/";
      }
    }

    fetchData();
  </script>
</body>
</html>
